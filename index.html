            animation: custom-pulse 2s infinite ease-in-out;

        @keyframes gentle-bounce {
            0%, 100% { transform: translateY(0); }

    <!-- 구글 파이어베이스 SDK 모듈 CDN 연결 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // =============================================================
        // [필수 설정] 파이어베이스에서 받은 고유 설정 정보(Config)를 아래에 채워주세요!
        // =============================================================
        const myFirebaseConfig = {
            apiKey: "AIzaSyBfqmUo_pUo97TpNsYKvohfelG7kmr_DR4",
            authDomain: "waiting-65590.firebaseapp.com",
            projectId: "waiting-65590",
            storageBucket: "waiting-65590.firebasestorage.app",
            messagingSenderId: "58647898582",
            appId: "1:58647898582:web:a07b57e7e9050b25239c77",
            measurementId: "G-C3TXJREPE3"
        };
        // =============================================================

        // APP STATE 전역 관리용 변수
        window.currentStatus = 'AVAILABLE';
        window.syncCode = '1'; // 기본 고정 채널을 '1'로 설정하여 즉각 자동 연동 유도

        let db = null;
        let auth = null;
        let appId = 'default-app-id';
        let currentUser = null;
        let firebaseUnsubscribe = null;

        // DOM 요소 제어 변수
        const statusContainer = document.getElementById('statusContainer');
        const syncIndicatorDot = document.getElementById('syncIndicatorDot');
        const syncIndicatorRing = document.getElementById('syncIndicatorRing');
        const syncBadgeText = document.getElementById('syncBadgeText');
        const syncBadge = document.getElementById('syncBadge');

        // 상태값 변경 사운드 발생 효과음 (브라우저 자체 신디사이저 활용)
        function playSound(type) {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                
                if (type === 'AVAILABLE') {
                    const notes = [293.66, 392.00, 587.33];
                    notes.forEach((freq, idx) => {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(freq, ctx.currentTime + idx * 0.15);
                        gain.gain.setValueAtTime(0.12, ctx.currentTime + idx * 0.15);
                        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + idx * 0.15 + 0.4);
                        osc.start(ctx.currentTime + idx * 0.15);
                        osc.stop(ctx.currentTime + idx * 0.15 + 0.4);
                    });
                } else if (type === 'BUSY') {
                    [0, 0.15].forEach((delay) => {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        osc.type = 'triangle';
                        osc.frequency.setValueAtTime(330, ctx.currentTime + delay);
                        gain.gain.setValueAtTime(0.1, ctx.currentTime + delay);
                        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + delay + 0.25);
                        osc.start(ctx.currentTime + delay);
                        osc.stop(ctx.currentTime + delay + 0.25);
                    });
                }
            } catch (e) { /* quiet */ }
        }

        // 실시간 전광판 상태 보드 렌더링 (순수 Tailwind CSS로 100% 레이아웃 복원)
        function updateDisplayPanel() {
            if (!statusContainer) return;

            // 터치를 유도하는 작은 안내 문구 캡션
            const touchCaption = `<span class="text-[10px] sm:text-xs md:text-sm font-bold opacity-90 mt-1"><i class="fa-solid fa-hand-pointer animate-bounce mr-1"></i> 화면 터치로 상태 전환</span>`;

            if (window.currentStatus === 'BUSY') {
                statusContainer.className = "rounded-[2.25rem] p-4 shadow-md flex flex-col items-center justify-center text-center border-2 border-rose-300 bg-gradient-to-br from-rose-500 via-red-600 to-rose-700 text-white animate-custom-pulse transition-all duration-500 shrink-0 h-[22vh] min-h-[110px] max-h-[160px] w-full shadow-lg shadow-rose-100 cursor-pointer hover:scale-[1.01] active:scale-[0.99]";
                statusContainer.innerHTML = `
                    <div class="flex items-center justify-center gap-2 sm:gap-4 mb-0.5 max-w-full overflow-hidden">
                        <i class="fa-solid fa-camera text-rose-100 animate-pulse shrink-0" style="font-size: clamp(28px, 4.5vh, 64px);"></i>
                        <h2 class="font-black tracking-widest text-white drop-shadow-sm truncate" style="font-size: clamp(32px, 6vh, 85px);">촬영중</h2>
                    </div>
                    <p class="font-bold text-rose-100 drop-shadow-sm text-center w-full" style="font-size: clamp(12px, 2.2vh, 24px);">지금은 입장이 불가합니다.</p>
                    ${touchCaption}
                `;
            } else {
                statusContainer.className = "rounded-[2.25rem] p-4 shadow-md flex flex-col items-center justify-center text-center border-2 border-emerald-300 bg-gradient-to-br from-emerald-400 via-teal-500 to-emerald-600 text-white animate-gentle-bounce transition-all duration-500 shrink-0 h-[23vh] min-h-[130px] max-h-[200px] w-full shadow-lg shadow-emerald-100 cursor-pointer hover:scale-[1.01] active:scale-[0.99]";
                statusContainer.innerHTML = `
                    <div class="flex items-center justify-center gap-2 sm:gap-4 mb-0.5 max-w-full overflow-hidden">
                        <i class="fa-solid fa-door-open text-emerald-100 shrink-0" style="font-size: clamp(28px, 4.5vh, 64px);"></i>
                        <h2 class="font-black tracking-widest text-white drop-shadow-sm truncate" style="font-size: clamp(32px, 6vh, 85px);">입장 가능</h2>
                    </div>
                    <p class="font-bold text-emerald-100 drop-shadow-sm text-center w-full" style="font-size: clamp(12px, 2.2vh, 24px);">지금 바로 입장해 주세요!</p>
                    ${touchCaption}
                `;
            }
        }

        // 주소창 Hash 방 번호 분석 및 자동 생성
        function parseUrlHashAndRun() {
            const hash = window.location.hash.substring(1);
            if (hash) {
                const parts = hash.split('-');
                if (parts.length >= 2 && parts[0] === 'booth') {
                    window.syncCode = parts[1];
                    const inputEl = document.getElementById('syncCodeInput');
                    if (inputEl) inputEl.value = window.syncCode;
                    return;
                }
            }
            window.syncCode = '1';
            window.location.hash = `booth-${window.syncCode}`;
            const inputEl = document.getElementById('syncCodeInput');
            if (inputEl) inputEl.value = window.syncCode;
        }

        // 수동 방 번호 변경 적용 함수 (선생님이 직접 입력 후 연결할 때)
        window.applyManualSyncCode = function() {
            const inputEl = document.getElementById('syncCodeInput');
            if (!inputEl) return;
            const code = inputEl.value.trim();
            if (!code) return;

            window.syncCode = code;
            window.location.hash = `booth-${code}`;

            // 새로운 방 번호로 Firestore 동기화 재구독
            subscribeToBoothFirestore();
        };

        // 현재 화면에서 직접 알림판 터치(클릭) 시 반대 상태로 토글 및 실시간 동기화
        window.toggleLocalBoothState = function() {
            const targetState = window.currentStatus === 'AVAILABLE' ? 'BUSY' : 'AVAILABLE';
            changeBoothState(targetState);
        };

        // RULE 3 COMPLIANT: 인증 처리 선행 후 Firestore 및 상태 관찰 작동 유도
        const initFirebaseEngine = async () => {
            let activeConfig = null;

            // 1. 직접 입력한 파이어베이스 Config가 있다면 우선 적용
            if (myFirebaseConfig.apiKey !== "YOUR_API_KEY") {
                activeConfig = myFirebaseConfig;
            } 
            // 2. 가상 시뮬레이터 환경 내 자동 주입 Config 백업 처리
            else if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                try {
                    activeConfig = JSON.parse(__firebase_config);
                } catch(e) {}
            }

            if (!activeConfig) {
                console.warn("Firebase config is missing.");
                updateSyncBadgeUI("unconfigured");
                return;
            }

            try {
                const app = initializeApp(activeConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

                // RULE 3: 커스텀 토큰 로그인 시도 후 에러 발생 시 익명 로그인으로 안전하게 폴백
                let signedIn = false;
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    try {
                        await signInWithCustomToken(auth, __initial_auth_token);
                        signedIn = true;
                    } catch (tokenError) {
                        console.warn("Custom token mismatched/failed. Falling back to anonymous sign-in gracefully:", tokenError);
                    }
                }
                
                // 만약 커스텀 토큰이 실패했거나 없는 경우 익명 로그인을 백업 진행합니다.
                if (!signedIn) {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, (user) => {
                    currentUser = user;
                    if (user) {
                        updateSyncBadgeUI("connected");
                        // 3단계 로그인 확인 완료 후 실시간 DB 감시 작동
                        subscribeToBoothFirestore();
                    } else {
                        updateSyncBadgeUI("disconnected");
                    }
                });

            } catch(e) {
                console.error("Firebase startup failed:", e);
                updateSyncBadgeUI("error");
            }
        };

        // RULE 1 COMPLIANT: 지정된 샌드박스 Firestore 컬렉션 경로 바인딩 규칙
        function subscribeToBoothFirestore() {
            if (!currentUser || !db) return;

            if (firebaseUnsubscribe) firebaseUnsubscribe();

            // RULE 1 경로 지정 준수: /artifacts/{appId}/public/data/{collectionName}/{documentId}
            const roomDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'booth_state', 'room_' + window.syncCode);

            firebaseUnsubscribe = onSnapshot(roomDocRef, (snap) => {
                if (snap.exists()) {
                    const data = snap.data();
                    if (data && data.status && data.status !== window.currentStatus) {
                        window.currentStatus = data.status;
                        updateDisplayPanel();
                        playSound(window.currentStatus);
                    }
                } else {
                    // 미존재 문서 공간 즉각 생성 바인딩
                    setDoc(roomDocRef, { status: window.currentStatus, lastUpdated: Date.now() }, { merge: true })
                        .catch(() => {});
                }
            }, (err) => {
                console.warn("Firestore snapshot loading error:", err);
                updateSyncBadgeUI("error");
            });
        }

        // 기기 상태 송수신 제어 함수 (RULE 3 의거하여 로그인 보안 가드 상태 검사)
        window.changeBoothState = async function(newState) {
            window.currentStatus = newState;
            updateDisplayPanel();
            playSound(newState);

            if (currentUser && db) {
                // RULE 1 경로 타겟 데이터 실시간 푸시
                const roomDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'booth_state', 'room_' + window.syncCode);
                try {
                    await setDoc(roomDocRef, { status: newState, lastUpdated: Date.now() }, { merge: true });
                } catch(e) {
                    console.error("Firestore write failure:", e);
                }
            }
        };

        // 실시간 무선 상태 동기화 상태 배지 업데이트 뷰어
        function updateSyncBadgeUI(state) {
            if (state === "connected") {
                syncIndicatorDot.className = "relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500";
                syncIndicatorRing.className = "animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75";
                syncBadgeText.innerText = "실시간 연동됨";
                syncBadge.className = "text-[9px] sm:text-[10px] bg-emerald-50 text-emerald-800 px-2.5 py-0.5 rounded-full font-bold border border-emerald-200 flex items-center gap-1 shrink-0 shadow-sm";
            } else if (state === "unconfigured") {
                syncIndicatorDot.className = "relative inline-flex rounded-full h-2.5 w-2.5 bg-amber-500";
                syncIndicatorRing.className = "absolute inline-flex h-full w-full rounded-full bg-amber-300 opacity-0";
                syncBadgeText.innerText = "설정값 입력 대기중";
                syncBadge.className = "text-[9px] sm:text-[10px] bg-amber-50 text-amber-700 px-2.5 py-0.5 rounded-full font-bold border border-amber-200 flex items-center gap-1 shrink-0 shadow-sm";
            } else {
                syncIndicatorDot.className = "relative inline-flex rounded-full h-2.5 w-2.5 bg-rose-500 animate-pulse";
                syncIndicatorRing.className = "absolute inline-flex h-full w-full rounded-full bg-rose-200 opacity-0";
                syncBadgeText.innerText = "연동 장치 끊김";
                syncBadge.className = "text-[9px] sm:text-[10px] bg-rose-50 text-rose-700 px-2.5 py-0.5 rounded-full font-bold border border-rose-200 flex items-center gap-1 shrink-0 shadow-sm";
            }
        }

        // 초기 시작 이벤트 핸들러 바인딩
        window.addEventListener('DOMContentLoaded', () => {
            parseUrlHashAndRun();
            updateDisplayPanel();
            initFirebaseEngine();
        });
    </script>
</body>
</html>
